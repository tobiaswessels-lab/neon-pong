<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON PONG</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      font-family: 'Press Start 2P', monospace;
    }

    #game-container {
      position: relative;
      /* Subtle outer glow to make the canvas feel like a lit screen */
      box-shadow:
        0 0 60px rgba(255, 0, 255, 0.25),
        0 0 120px rgba(0, 255, 255, 0.12),
        0 0 4px rgba(255, 255, 255, 0.15);
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }

    /* CRT scanline overlay — horizontal lines every 3px */
    #scanlines {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(
        0deg,
        rgba(0, 0, 0, 0.15) 0px,
        rgba(0, 0, 0, 0.15) 1px,
        transparent 1px,
        transparent 3px
      );
      pointer-events: none;
      z-index: 10;
    }

    /* Subtle CRT curvature vignette — dark at corners and edges */
    #vignette {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(
        ellipse at center,
        transparent 55%,
        rgba(0, 0, 0, 0.45) 80%,
        rgba(0, 0, 0, 0.75) 100%
      );
      pointer-events: none;
      z-index: 11;
    }

    /* Phosphor bloom: very faint outer glow layer over entire screen */
    #bloom {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(
        ellipse at center,
        rgba(80, 0, 120, 0.07) 0%,
        transparent 70%
      );
      pointer-events: none;
      z-index: 9;
      mix-blend-mode: screen;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="pong-canvas" width="1024" height="768"></canvas>
    <div id="bloom"></div>
    <div id="scanlines"></div>
    <div id="vignette"></div>
  </div>
  <script type="module" src="src/game.js"></script>
</body>
</html>
